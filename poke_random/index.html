<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Blind Pick</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- ═══════════════════════════════ LOBBY SCREEN ═══════════════════════════════ -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-bg"></div>
    <div class="lobby-center">
      <div class="logo-wrap">
        <span class="logo-pre">POKÉMON</span>
        <h1 class="logo-title">BLIND<span class="logo-accent">PICK</span></h1>
        <span class="logo-sub">MULTIPLAYER DRAFT ARENA</span>
      </div>

      <div class="lobby-card">
        <div class="input-group">
          <label>TON NOM</label>
          <input id="username-input" type="text" placeholder="Dresseur..." maxlength="16" />
        </div>

        <div class="lobby-actions">
          <button class="btn btn-primary" id="btn-create">
            <span class="btn-icon">🏠</span> CRÉER UN SALON
          </button>
          <div class="separator">OU</div>
          <div class="join-row">
            <input id="room-code-input" type="text" placeholder="CODE (5 caract.)" maxlength="5" />
            <button class="btn btn-secondary" id="btn-join">REJOINDRE</button>
          </div>
        </div>
      </div>

      <div id="room-created-info" class="room-info hidden">
        <p>Salon créé ! Code :</p>
        <div class="room-code-display" id="room-code-display">—</div>
        <p class="waiting-text"><span class="dot-anim">⚡</span> En attente d'un adversaire...</p>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════ DRAFT SCREEN ═══════════════════════════════ -->
  <div id="screen-draft" class="screen">
    <div class="draft-header">
      <div class="draft-player-info" id="draft-you-info">
        <span class="player-label">VOUS</span>
        <span class="player-name-hdr" id="draft-your-name">—</span>
        <span class="team-counter" id="draft-your-count">0/6 🔴</span>
        <span class="budget-display" id="draft-your-budget" style="display:none">💰 1000₽</span>
      </div>
      <div class="draft-center-hdr">
        <div class="draft-round-label">DRAFT</div>
        <div id="draft-mode-label" class="mode-badge">—</div>
      </div>
      <div class="draft-player-info right" id="draft-opp-info">
        <span class="player-label">ADVERSAIRE</span>
        <span class="player-name-hdr" id="draft-opp-name">—</span>
        <span class="team-counter" id="draft-opp-count">0/6 🔵</span>
        <span class="budget-display" id="draft-opp-budget" style="display:none">💰 1000₽</span>
      </div>
    </div>

    <!-- HOST ONLY: Mode selection + Generate button -->
    <div id="host-controls" class="host-controls hidden">
      <select id="mode-select" class="mode-select">
        <option value="type">🔥 Types</option>
        <option value="size">📏 Taille / Poids</option>
        <option value="pokedex">🔢 Numéro Pokédex</option>
        <option value="color">🎨 Couleur</option>
        <option value="hp">❤️ Points de Vie</option>
        <option value="generation">🌍 Génération</option>
        <option value="auction">💰 Enchère Dynamique</option>
      </select>
      <button class="btn btn-primary" id="btn-generate">
        ⚡ GÉNÉRER 3 POKÉMON
      </button>
    </div>

    <!-- Pokemon offers grid -->
    <div id="offers-grid" class="offers-grid">
      <!-- Filled dynamically -->
    </div>

    <!-- Auction panel -->
    <div id="auction-panel" class="auction-panel hidden">
      <div class="auction-title">⚡ ENCHÈRE EN COURS</div>
      <div class="auction-pokemon-name" id="auction-pkmn-name">—</div>
      <div class="auction-current-bid">
        Mise actuelle : <span id="auction-bid-amount">0₽</span>
        par <span id="auction-bidder-name">—</span>
      </div>
      <div class="auction-btns">
        <button class="btn btn-bid" id="btn-bid-10">+10₽</button>
        <button class="btn btn-bid" id="btn-bid-50">+50₽</button>
        <button class="btn btn-adjuge hidden" id="btn-adjuge">🔨 ADJUGÉ VENDU</button>
      </div>
    </div>

    <!-- Teams preview -->
    <div class="teams-preview">
      <div class="team-preview-col" id="your-team-preview">
        <div class="team-preview-title">VOTRE ÉQUIPE</div>
        <div class="team-sprites" id="your-team-sprites"></div>
      </div>
      <div class="team-preview-col" id="opp-team-preview">
        <div class="team-preview-title">ÉQUIPE ADVERSE</div>
        <div class="team-sprites" id="opp-team-sprites"></div>
      </div>
    </div>

    <div id="draft-status" class="draft-status"></div>
  </div>

  <!-- ═══════════════════════════════ BATTLE SCREEN ═══════════════════════════════ -->
  <div id="screen-battle" class="screen">
    <div class="battle-arena">
      <!-- Enemy side -->
      <div class="battle-enemy-side">
        <div class="battle-info-box enemy-box">
          <div class="battle-pkmn-name" id="enemy-name">—</div>
          <div class="hp-bar-wrap">
            <div class="hp-bar-label">PV</div>
            <div class="hp-bar-track">
              <div class="hp-bar-fill" id="enemy-hp-bar" style="width:100%"></div>
            </div>
            <div class="hp-numbers" id="enemy-hp-numbers">—</div>
          </div>
        </div>
        <div class="battle-sprite-wrap enemy-sprite-wrap">
          <img class="battle-sprite enemy-sprite" id="enemy-sprite" src="" alt="" />
        </div>
      </div>

      <!-- Player side -->
      <div class="battle-player-side">
        <div class="battle-sprite-wrap player-sprite-wrap">
          <img class="battle-sprite player-sprite" id="player-sprite" src="" alt="" />
        </div>
        <div class="battle-info-box player-box">
          <div class="battle-pkmn-name" id="player-name">—</div>
          <div class="hp-bar-wrap">
            <div class="hp-bar-label">PV</div>
            <div class="hp-bar-track">
              <div class="hp-bar-fill" id="player-hp-bar" style="width:100%"></div>
            </div>
            <div class="hp-numbers" id="player-hp-numbers">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Battle UI bottom -->
    <div class="battle-ui">
      <div class="battle-log-wrap">
        <div class="battle-log" id="battle-log">
          <p class="log-entry">Le combat commence !</p>
        </div>
      </div>
      <div class="battle-actions" id="battle-actions">
        <!-- Moves or switch -->
        <div id="moves-panel" class="moves-panel">
          <div class="moves-grid" id="moves-grid">
            <!-- filled dynamically -->
          </div>
        </div>
        <div class="switch-panel">
          <div class="switch-label">ÉQUIPE</div>
          <div class="team-slots" id="team-slots"></div>
        </div>
      </div>
    </div>

    <!-- Team overview bars at bottom -->
    <div class="battle-teams-bar">
      <div class="battle-team-row" id="player-team-row"></div>
      <div class="battle-team-row" id="enemy-team-row"></div>
    </div>

    <!-- Winner overlay -->
    <div id="winner-overlay" class="winner-overlay hidden">
      <div class="winner-box">
        <div class="winner-emoji">🏆</div>
        <div class="winner-title" id="winner-title">VICTOIRE !</div>
        <div class="winner-name" id="winner-name">—</div>
        <button class="btn btn-primary" onclick="location.reload()">REJOUER</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
